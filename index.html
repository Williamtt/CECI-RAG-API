<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CECI 工安缺失案例庫</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .card-img { transition: transform .2s; }
    .card-img:hover { transform: scale(1.02); }
    .score-bar { transition: width .4s ease; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .drag-over { border-color: #3b82f6 !important; background: #eff6ff !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()" x-cloak>

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="bg-orange-500 rounded-lg p-2">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-800 leading-tight">CECI 工安缺失案例庫</h1>
        <p class="text-xs text-gray-400">AI 智慧檢索系統</p>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <a href="/docs" target="_blank"
          class="text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded px-2 py-1 transition">
          API Docs
        </a>
      </div>
    </div>
  </header>

  <!-- Search Panel -->
  <div class="max-w-6xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8">

      <!-- Mode Tabs -->
      <div class="flex gap-1 mb-5 bg-gray-100 rounded-xl p-1 w-fit">
        <template x-for="(label, mode) in modes" :key="mode">
          <button
            @click="searchMode = mode"
            :class="searchMode === mode
              ? 'bg-white text-gray-800 shadow-sm font-medium'
              : 'text-gray-500 hover:text-gray-700'"
            class="px-4 py-1.5 rounded-lg text-sm transition"
            x-text="label">
          </button>
        </template>
      </div>

      <!-- Text Search -->
      <div x-show="searchMode === 'text'">
        <div class="flex gap-3">
          <input
            x-model="query"
            @keydown.enter="search()"
            type="text"
            placeholder="描述工安缺失情境，例如：施工架未設護欄、作業人員未佩戴安全帽..."
            class="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
          />
          <button
            @click="search()"
            :disabled="loading || !query.trim()"
            class="bg-orange-500 hover:bg-orange-600 disabled:bg-gray-300 text-white px-6 py-3 rounded-xl text-sm font-medium transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            搜尋
          </button>
        </div>
      </div>

      <!-- Image Search -->
      <div x-show="searchMode === 'image' || searchMode === 'rerank'">
        <div
          class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center cursor-pointer hover:border-orange-300 transition"
          :class="dragOver ? 'drag-over' : ''"
          @click="$refs.fileInput.click()"
          @dragover.prevent="dragOver = true"
          @dragleave="dragOver = false"
          @drop.prevent="handleDrop($event)">
          <div x-show="!imagePreview">
            <svg class="w-10 h-10 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="text-sm text-gray-400">點擊或拖曳上傳工地照片</p>
            <p class="text-xs text-gray-300 mt-1">支援 JPG、PNG</p>
          </div>
          <div x-show="imagePreview" class="relative inline-block">
            <img :src="imagePreview" class="max-h-48 rounded-lg mx-auto object-contain" />
            <button
              @click.stop="clearImage()"
              class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs flex items-center justify-center hover:bg-red-600">
              ✕
            </button>
          </div>
        </div>
        <input x-ref="fileInput" type="file" accept="image/*" class="hidden" @change="handleFileSelect($event)" />
        <div class="mt-3 flex justify-end">
          <button
            @click="search()"
            :disabled="loading || !imageFile"
            class="bg-orange-500 hover:bg-orange-600 disabled:bg-gray-300 text-white px-6 py-2.5 rounded-xl text-sm font-medium transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <span x-text="searchMode === 'rerank' ? '精準搜尋' : '以圖搜尋'"></span>
          </button>
        </div>
      </div>

      <!-- Top-K -->
      <div class="mt-4 flex items-center gap-3">
        <label class="text-xs text-gray-400">回傳筆數</label>
        <select x-model="topK" class="border border-gray-200 rounded-lg px-2 py-1 text-xs text-gray-600 focus:outline-none">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="20">20</option>
        </select>
        <div x-show="searchMode === 'rerank'" class="text-xs text-orange-500 flex items-center gap-1">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
          </svg>
          VLM 精準重排模式
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="flex justify-center py-16">
      <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-orange-200 border-t-orange-500 mb-3"></div>
        <p class="text-sm text-gray-400">檢索中...</p>
      </div>
    </div>

    <!-- Error -->
    <div x-show="error && !loading" class="bg-red-50 border border-red-100 rounded-xl p-4 mb-6 text-sm text-red-600" x-text="error"></div>

    <!-- Results -->
    <div x-show="results.length > 0 && !loading">
      <div class="flex items-center justify-between mb-4">
        <p class="text-sm text-gray-500">
          找到 <span class="font-semibold text-gray-700" x-text="results.length"></span> 筆結果
          <span class="text-gray-400 text-xs ml-1" x-text="'(' + queryType + ')'"></span>
        </p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        <template x-for="(r, i) in results" :key="r.image_name">
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in hover:shadow-md transition">

            <!-- Image -->
            <div class="relative bg-gray-100 cursor-pointer" @click="openModal(r)">
              <img
                :src="'/image/' + r.image_name + '.jpg'"
                :alt="r.image_name"
                class="w-full h-52 object-cover card-img"
                @error="$el.dataset.retry = ($el.dataset.retry||0)*1+1; $el.src = $el.dataset.retry==1 ? '/image/'+r.image_name+'.png' : 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22208%22><rect width=%22400%22 height=%22208%22 fill=%22%23f3f4f6%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2214%22 fill=%22%239ca3af%22>圖片不存在</text></svg>'"
              />
              <!-- Score Badge -->
              <div class="absolute top-2 right-2 bg-black bg-opacity-60 text-white text-xs px-2 py-1 rounded-full font-mono">
                <span x-text="(r.score * 100).toFixed(1) + '%'"></span>
              </div>
              <!-- Rank Badge -->
              <div class="absolute top-2 left-2 bg-orange-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center font-bold"
                x-text="i + 1"></div>
            </div>

            <!-- Content -->
            <div class="p-4">
              <p class="text-xs text-gray-400 mb-2 font-mono" x-text="'案例 #' + r.image_name"></p>

              <!-- Score Bar -->
              <div class="bg-gray-100 rounded-full h-1.5 mb-3">
                <div class="bg-orange-400 h-1.5 rounded-full score-bar" :style="'width:' + (r.score * 100) + '%'"></div>
              </div>

              <!-- Description -->
              <div class="mb-2">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">缺失描述</p>
                <p class="text-sm text-gray-700 line-clamp-3" x-text="r.description || '—'"></p>
              </div>

              <!-- Law Ref -->
              <div class="mb-3">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">法規依據</p>
                <p class="text-xs text-blue-600 line-clamp-2" x-text="r.law_ref || '—'"></p>
              </div>

              <!-- Expand Toggle -->
              <button
                @click="r._expanded = !r._expanded"
                class="w-full text-xs text-gray-400 hover:text-gray-600 flex items-center justify-center gap-1 py-1 border-t border-gray-50 mt-1 transition">
                <span x-text="r._expanded ? '收合' : '展開場景與風險描述'"></span>
                <svg class="w-3 h-3 transition-transform" :class="r._expanded ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>

              <!-- Expanded -->
              <div x-show="r._expanded" x-transition class="mt-3 space-y-2 border-t border-gray-50 pt-3">
                <div>
                  <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">場景描述</p>
                  <p class="text-xs text-gray-600 leading-relaxed" x-text="r['場景描述'] || '—'"></p>
                </div>
                <div>
                  <p class="text-xs font-semibold text-red-400 uppercase tracking-wide mb-1">潛在風險</p>
                  <p class="text-xs text-gray-600 leading-relaxed" x-text="r['潛在風險描述'] || '—'"></p>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Empty State -->
    <div x-show="searched && results.length === 0 && !loading && !error" class="text-center py-20">
      <svg class="w-12 h-12 text-gray-200 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-gray-400 text-sm">找不到相關案例，請換個關鍵字試試</p>
    </div>
  </div>

  <!-- Image Modal -->
  <div
    x-show="modalItem"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4"
    @click.self="modalItem = null"
    @keydown.escape.window="modalItem = null">
    <div x-show="modalItem" class="bg-white rounded-2xl max-w-3xl w-full max-h-screen overflow-y-auto shadow-2xl">
      <div class="flex items-center justify-between p-4 border-b">
        <h2 class="font-semibold text-gray-700" x-text="modalItem ? '案例 #' + modalItem.image_name : ''"></h2>
        <button @click="modalItem = null" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
      </div>
      <template x-if="modalItem">
        <div>
          <img
            :src="'/image/' + modalItem.image_name + '.jpg'"
            class="w-full object-contain max-h-96"
            @error="$el.dataset.retry = ($el.dataset.retry||0)*1+1; $el.src = $el.dataset.retry==1 ? '/image/'+modalItem.image_name+'.png' : 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22300%22><rect width=%22600%22 height=%22300%22 fill=%22%23f3f4f6%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2216%22 fill=%22%239ca3af%22>圖片不存在</text></svg>'"
          />
          <div class="p-5 space-y-4">
            <div>
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">缺失描述</p>
              <p class="text-sm text-gray-700" x-text="modalItem.description || '—'"></p>
            </div>
            <div>
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">法規依據</p>
              <p class="text-sm text-blue-600" x-text="modalItem.law_ref || '—'"></p>
            </div>
            <div>
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">場景描述</p>
              <p class="text-sm text-gray-600 leading-relaxed" x-text="modalItem['場景描述'] || '—'"></p>
            </div>
            <div>
              <p class="text-xs font-semibold text-red-400 uppercase tracking-wide mb-1">潛在風險</p>
              <p class="text-sm text-gray-600 leading-relaxed" x-text="modalItem['潛在風險描述'] || '—'"></p>
            </div>
            <div class="flex items-center gap-2 pt-2 border-t">
              <span class="text-xs text-gray-400">相似度</span>
              <span class="text-sm font-mono font-semibold text-orange-500" x-text="(modalItem.score * 100).toFixed(2) + '%'"></span>
              <span class="text-xs text-gray-300 ml-auto" x-text="modalItem.source_collection"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script>
    function app() {
      return {
        searchMode: 'text',
        modes: { text: '文字搜尋', image: '以圖搜尋', rerank: '精準搜尋' },
        query: '',
        topK: '5',
        imageFile: null,
        imagePreview: null,
        dragOver: false,
        loading: false,
        error: '',
        results: [],
        searched: false,
        queryType: '',
        modalItem: null,

        handleFileSelect(e) {
          const file = e.target.files[0];
          if (file) this.setImage(file);
        },
        handleDrop(e) {
          this.dragOver = false;
          const file = e.dataTransfer.files[0];
          if (file && file.type.startsWith('image/')) this.setImage(file);
        },
        setImage(file) {
          this.imageFile = file;
          const reader = new FileReader();
          reader.onload = (e) => { this.imagePreview = e.target.result; };
          reader.readAsDataURL(file);
        },
        clearImage() {
          this.imageFile = null;
          this.imagePreview = null;
          this.$refs.fileInput.value = '';
        },
        openModal(item) {
          this.modalItem = item;
        },

        async search() {
          this.error = '';
          this.results = [];
          this.searched = true;
          this.loading = true;

          try {
            let data;

            if (this.searchMode === 'text') {
              const res = await fetch('/search/text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: this.query, collection: 'both', top_k: parseInt(this.topK) })
              });
              data = await res.json();

            } else if (this.searchMode === 'image') {
              const form = new FormData();
              form.append('file', this.imageFile);
              form.append('collection', 'both');
              form.append('top_k', this.topK);
              const res = await fetch('/search/image', { method: 'POST', body: form });
              data = await res.json();

            } else if (this.searchMode === 'rerank') {
              const form = new FormData();
              form.append('file', this.imageFile);
              form.append('top_k', this.topK);
              const res = await fetch('/search/image_rerank', { method: 'POST', body: form });
              data = await res.json();
            }

            if (data.detail) throw new Error(data.detail);
            this.results = (data.results || []).map(r => ({ ...r, _expanded: false }));
            this.queryType = data.query_type || '';
          } catch (e) {
            this.error = '搜尋失敗：' + e.message;
          } finally {
            this.loading = false;
          }
        }
      }
    }
  </script>
</body>
</html>
